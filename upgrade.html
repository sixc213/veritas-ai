<!DOCTYPE html>
<html>
<head>
<title>Upgrade - VERITAS AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
margin-top:20px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Upgrade to VERITAS AI Pro</h2>

<p>$10/month - Unlimited API Access</p>

<input id="email" placeholder="Enter your email"><br><br>

<button onclick="makePayment()">Pay $10</button>

<p id="result"></p>

<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>

function makePayment(){

let email = document.getElementById("email").value.trim()

if(!email){
alert("Enter email")
return
}

FlutterwaveCheckout({
  public_key: "FLWPUBK_TEST-60fce4e27377013f8cc489a036d55f2f-X",
  tx_ref: "veritas_" + Date.now(),
  amount: 10,
  currency: "USD",
  payment_options: "card",

  customer: {
    email: email,
  },

  callback: function (response) {

    if(response.status === "successful"){

      // 🔥 AUTO GENERATE KEY
      let key = "veritas_pro_" + Math.random().toString(36).substring(2,10)

      let keys = JSON.parse(localStorage.getItem("veritas_keys")) || []

      keys.push({email, plan:"pro", key})

      localStorage.setItem("veritas_keys", JSON.stringify(keys))

      document.getElementById("result").innerHTML =
      "✅ Payment Successful<br><br>Your API Key:<br><b>"+key+"</b>"

    }

  },

  onclose: function() {
    console.log("Payment closed");
  },

  customizations: {
    title: "VERITAS AI",
    description: "Pro API Access",
  }

});

}

</script>

</body>
</html>

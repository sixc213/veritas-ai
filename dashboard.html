<!DOCTYPE html>
<html>
<head>
<title>VERITAS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<h1>VERITAS AI Dashboard</h1>

<table>
<thead>
<tr>
<th>Token</th>
<th>Score</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

function loadData(){

  let data = JSON.parse(localStorage.getItem("veritas_results")) || []

  let table = document.getElementById("dataTable")

  table.innerHTML = `
  <tr>
    <th>Token</th>
    <th>Score</th>
    <th>Status</th>
  </tr>
  `

  data.slice().reverse().forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.token}</td>
        <td>${item.score}</td>
        <td>${item.status}</td>
      </tr>
    `
  })
}

// run every 2 seconds
setInterval(loadData, 2000)

loadData()

</script>
<script>

fetch("https://your-vercel-site.vercel.app/api/dashboard")
.then(res => res.json())
.then(data => {

let html = "<h2>Users</h2>";

data.forEach(user => {
  html += `
  <div style="background:#eee;padding:10px;margin:10px;">
    <p>Email: ${user.email}</p>
    <p>API Key: ${user.key}</p>
    <p>Usage: ${user.usage}</p>
  </div>
  `;
});

document.body.innerHTML += html;

});

</script>
  
</body>
</html>

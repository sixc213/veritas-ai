<!DOCTYPE html>
<html>
<head>
<title>VERITAS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

table{
  width:95%;
  margin:auto;
  border-collapse:collapse;
  background:white;
  color:black;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
}

th{
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<h1>VERITAS AI Dashboard</h1>

<table id="dataTable">
  <tr>
    <th>Token</th>
    <th>Score</th>
    <th>Status</th>
  </tr>
</table>

<script>
function loadData(){

  let data = JSON.parse(localStorage.getItem("veritas_results")) || []

  let table = document.getElementById("dataTable")

  table.innerHTML = `
    <tr>
      <th>Token</th>
      <th>Score</th>
      <th>Status</th>
    </tr>
  `

  if(data.length === 0){
    table.innerHTML += `
      <tr>
        <td colspan="3">No verification results yet</td>
      </tr>
    `
    return
  }

  data.slice().reverse().forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.token}</td>
        <td>${item.score}%</td>
        <td>${item.status}</td>
      </tr>
    `
  })
}

window.onload = () => {
  loadData()
  setInterval(loadData, 2000)
}
</script>

</body>
</html>

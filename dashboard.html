<script>

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsanp6bHZ6dWt0cXpqY3Flbmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzc2ODIsImV4cCI6MjA4ODA1MzY4Mn0.S7L2XCOTetZA37GI1WckjpW7u23W6hcAHjLhSv8ThXM"

const supabase = window.supabase.createClient(

SUPABASE_KEY
)

async function loadData(){

let { data } = await supabase
.from("verifications")
.select("*")
.order("id",{ascending:false})

let table=""

data.forEach(v=>{

table += `
<tr>
<td>${v.token}</td>
<td>${v.score}</td>
<td>${v.status}</td>
</tr>
`

})

document.getElementById("tableBody").innerHTML = table

}

loadData()

</script>

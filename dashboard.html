<!DOCTYPE html>
<html>
<head>
<title>VERITAS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<h1>VERITAS AI Dashboard</h1>

<table>
<thead>
<tr>
<th>Token</th>
<th>Score</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

function loadDashboard(){

let results = JSON.parse(localStorage.getItem("veritas_results")) || [];

let table = "";

results.slice().reverse().forEach(v=>{
  table += `
  <tr>
    <td>${v.token}</td>
    <td>${v.score}</td>
    <td>${v.status}</td>
  </tr>
  `;
});

document.getElementById("tableBody").innerHTML = table;

}

// run on load
loadDashboard();

// 🔥 auto refresh every 2 seconds
setInterval(loadDashboard, 2000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>VERITAS AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:#111827;
}

.hero{
text-align:center;
padding:60px 20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

.section{
padding:40px 20px;
text-align:center;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:12px;
max-width:600px;
margin:auto;
}

input{
padding:10px;
width:80%;
margin-top:10px;
}
</style>
</head>

<body>

<nav>
<h2>VERITAS AI</h2>
<div>Human Verification</div>
</nav>

<div class="hero">
<h1>AI Human Verification</h1>
<p>Detect real humans vs bots instantly</p>
<button onclick="startSession()">Run Live Demo</button>
</div>

<div class="section">
<div class="card">

<div id="testArea"></div>

<div id="resultArea" style="display:none;">

<h3>VERITAS AI Result</h3>

<div style="background:#eee;width:100%;height:25px;border-radius:10px;">
<div id="scoreBar" style="height:25px;width:0%;background:#4CAF50;border-radius:10px;"></div>
</div>

<p id="scoreText"></p>
<p id="statusText"></p>
<p id="tokenText"></p>

</div>

</div>
</div>

<script>

let startTime
let correctAnswer
let round=0
let totalScore=0

const questions=[
{q:"2 + 5",a:"7"},
{q:"Capital of Nigeria?",a:"abuja"},
{q:"3 + 6",a:"9"},
{q:"Color of sky?",a:"blue"}
]

function generateToken(score){
return "VER-"+score+"-"+Math.random().toString(36).substring(2,8).toUpperCase()
}

function startSession(){

round = 0
totalScore = 0

// clear previous UI completely
document.getElementById("testArea").innerHTML = ""
document.getElementById("resultArea").style.display = "none"

// small delay makes it smoother
setTimeout(()=>{
nextRound()
}, 300)

}
  
function nextRound(){

if(round >= 3){
finishVerification()
return
}

round++

let item = questions[Math.floor(Math.random()*questions.length)]

correctAnswer = item.a

document.getElementById("testArea").innerHTML = `
<h3>Round ${round} of 3</h3>
<p>${item.q}</p>
<input id="answer" placeholder="Type answer here">
<br><br>
<button onclick="checkAnswer()">Submit</button>
`

// focus input automatically
setTimeout(()=>{
document.getElementById("answer").focus()
},100)

startTime = Date.now()

}

function checkAnswer(){

let time=(Date.now()-startTime)/1000
let answer=document.getElementById("answer").value.toLowerCase().trim()

let score=0

if(answer==correctAnswer) score+=60
if(time>1 && time<12) score+=40

totalScore+=score

nextRound()
}

function saveVerification(token, score, status){

let results = JSON.parse(localStorage.getItem("veritas_results")) || []

results.push({token,score,status})

localStorage.setItem("veritas_results", JSON.stringify(results))

}

function finishVerification(){

let avg=Math.round(totalScore/3)

let status=avg>=70?"Verified Human":"Bot"

let token=generateToken(avg)

saveVerification(token, avg, status)

document.getElementById("testArea").innerHTML=""

document.getElementById("resultArea").style.display="block"

document.getElementById("scoreBar").style.width=avg+"%"

document.getElementById("scoreText").innerText="Score: "+avg+"%"

document.getElementById("statusText").innerText="Status: "+status

document.getElementById("tokenText").innerText="Token: "+token

}
  
</script>

<p>Want to integrate? Contact us.</p>
</body>
</html>

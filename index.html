<!DOCTYPE html>
<html>
<head>
<title>VERITAS AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:#111827;
}

.hero{
text-align:center;
padding:60px 20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.section{
padding:50px 20px;
text-align:center;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:12px;
max-width:600px;
margin:auto;
}

input{
padding:10px;
width:80%;
margin-top:10px;
}

</style>
</head>

<body>

<nav>
<h2>VERITAS AI</h2>
<div>Human Verification Infrastructure</div>
</nav>

<div class="hero">
<h1>AI Powered Human Verification</h1>
<p>Verify freelancers, job applicants and users instantly.</p>
<button onclick="startSession()">Run Live Demo</button>
</div>

<div class="section">
<div class="card">

<div id="testArea"></div>

<div id="resultArea">

<h3>VERITAS AI Result</h3>

<div style="background:#eee;width:100%;height:25px;border-radius:10px;">
<div id="scoreBar" style="height:25px;width:0%;background:#4CAF50;border-radius:10px;"></div>
</div>

<p id="scoreText"></p>
<p id="statusText"></p>
<p id="tokenText"></p>

</div>

</div>
</div>

<script>

let startTime
let correctAnswer
let round=0
let totalScore=0

const businessQuestions=[
{question:"Revenue minus expenses equals?",answer:"profit"},
{question:"Person who starts a business?",answer:"entrepreneur"},
{question:"Money used to start a business?",answer:"capital"},
{question:"Selling products online is called?",answer:"ecommerce"}
]

function generateToken(score){

let random=Math.random().toString(36).substring(2,8).toUpperCase()

return "VER-"+score+"-"+random

}

function startSession(){

round=0
totalScore=0

document.getElementById("resultArea").style.display="none"

nextRound()

}

function nextRound(){

if(round>=3){
finishVerification()
return
}

round++

let type=Math.floor(Math.random()*2)

if(type===0){

let n1=Math.floor(Math.random()*10)+1
let n2=Math.floor(Math.random()*10)+1

correctAnswer=n1+n2

document.getElementById("testArea").innerHTML=

"<h3>Round "+round+" of 3</h3>"+
"<p>Solve: "+n1+" + "+n2+"</p>"+
"<input id='answer'><br><br>"+
"<button onclick='checkAnswer()'>Submit</button>"

}

else{

let q=businessQuestions[Math.floor(Math.random()*businessQuestions.length)]

correctAnswer=q.answer

document.getElementById("testArea").innerHTML=

"<h3>Round "+round+" of 3</h3>"+
"<p>"+q.question+"</p>"+
"<input id='answer'><br><br>"+
"<button onclick='checkAnswer()'>Submit</button>"

}

startTime=Date.now()

}

function checkAnswer(){

let time=(Date.now()-startTime)/1000

let answer=document.getElementById("answer").value.toLowerCase().trim()

let score=0

if(answer==correctAnswer) score+=60
if(time>1 && time<12) score+=40

totalScore+=score

nextRound()

}

function finishVerification(){

let avg=Math.round(totalScore/3)

let status=avg>=70?"Verified Human":"Verification Failed"

let token=generateToken(avg)
  
fetch("https://veritas-ai-gamma.vercel.app/api/verify", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
score: avg
})
})
.then(res=>res.json())
.then(data=>{
console.log(data);
});
document.getElementById("testArea").innerHTML=""

document.getElementById("resultArea").style.display="block"

document.getElementById("scoreBar").style.width=avg+"%"

document.getElementById("scoreText").innerText="Human Score: "+avg+"%"

document.getElementById("statusText").innerText="Status: "+status

document.getElementById("tokenText").innerText="Token: "+token

}

</script>

</body>
</html>
